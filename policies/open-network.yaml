# open-network.yaml — 开放网络访问 Policy
#
# 允许沙盒内的 Agent（openclaw 进程）访问常用互联网资源，包括：
#   - GitHub（代码克隆、API 调用、raw 文件下载）
#   - PyPI（pip install）
#   - npm / Yarn（npm install）
#   - Docker Hub / NVIDIA Container Registry（docker pull）
#   - Hugging Face（模型下载）
#   - apt 软件包（apt-get install）
#   - NVIDIA 开发者资源（developer.nvidia.com、docs.nvidia.com 等）
#   - 常用 CDN 和搜索（Cloudflare、Google、DuckDuckGo 等）
#
# 注意：OpenShell Policy 不支持裸通配符 host: "*"，
#       对于未列出的域名，OpenShell 会在 TUI 中提示操作员批准。

preset:
  name: open-network
  description: "Open internet access for development: GitHub, PyPI, npm, Docker, apt, and general HTTPS"

network_policies:

  # ── GitHub ──────────────────────────────────────────────────────────────────
  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
      - host: raw.githubusercontent.com
        port: 443
        access: full
      - host: objects.githubusercontent.com
        port: 443
        access: full
      - host: codeload.github.com
        port: 443
        access: full
      - host: uploads.github.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/gh }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
      - { path: /usr/local/bin/node }
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/python3 }
      - { path: /usr/bin/python3 }

  # ── PyPI ────────────────────────────────────────────────────────────────────
  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
        access: full
      - host: files.pythonhosted.org
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/python3* }
      - { path: /usr/bin/pip* }
      - { path: /usr/local/bin/python3* }
      - { path: /usr/local/bin/pip* }
      - { path: /sandbox/.venv/bin/python* }
      - { path: /sandbox/.venv/bin/pip* }
      - { path: /sandbox/.uv/python/**/python* }
      - { path: /sandbox/.local/bin/pip* }
      - { path: /usr/local/bin/openclaw }

  # ── npm / Yarn ───────────────────────────────────────────────────────────────
  npm_yarn:
    name: npm_yarn
    endpoints:
      - host: registry.npmjs.org
        port: 443
        access: full
      - host: registry.yarnpkg.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/npm* }
      - { path: /usr/local/bin/npx* }
      - { path: /usr/local/bin/node* }
      - { path: /usr/local/bin/yarn* }
      - { path: /usr/bin/npm* }
      - { path: /usr/bin/node* }
      - { path: /usr/local/bin/openclaw }

  # ── Docker Hub / NVIDIA Container Registry ──────────────────────────────────
  docker_registries:
    name: docker_registries
    endpoints:
      - host: registry-1.docker.io
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: auth.docker.io
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: nvcr.io
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: authn.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/bin/docker }
      - { path: /usr/local/bin/openclaw }

  # ── Hugging Face ─────────────────────────────────────────────────────────────
  huggingface:
    name: huggingface
    endpoints:
      - host: huggingface.co
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: cdn-lfs.huggingface.co
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/python3 }
      - { path: /usr/local/bin/node }
      - { path: /usr/local/bin/openclaw }

  # ── apt 软件包（Debian/Ubuntu）──────────────────────────────────────────────
  apt:
    name: apt
    endpoints:
      - host: deb.debian.org
        port: 80
        access: full
      - host: deb.debian.org
        port: 443
        access: full
      - host: security.debian.org
        port: 80
        access: full
      - host: security.debian.org
        port: 443
        access: full
      - host: archive.ubuntu.com
        port: 80
        access: full
      - host: archive.ubuntu.com
        port: 443
        access: full
      - host: security.ubuntu.com
        port: 80
        access: full
      - host: security.ubuntu.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/apt }
      - { path: /usr/bin/apt-get }
      - { path: /usr/bin/dpkg }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }

  # ── NVIDIA 开发者资源 ─────────────────────────────────────────────────────────
  nvidia_web:
    name: nvidia_web
    endpoints:
      - host: developer.nvidia.com
        port: 443
        access: full
      - host: docs.nvidia.com
        port: 443
        access: full
      - host: www.nvidia.com
        port: 443
        access: full
      - host: blogs.nvidia.com
        port: 443
        access: full
      - host: build.nvidia.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
      - { path: /usr/local/bin/node }

  # ── 常用搜索和 CDN ────────────────────────────────────────────────────────────
  web_common:
    name: web_common
    endpoints:
      - host: duckduckgo.com
        port: 443
        access: full
      - host: api.duckduckgo.com
        port: 443
        access: full
      - host: links.duckduckgo.com
        port: 443
        access: full
      - host: www.google.com
        port: 443
        access: full
      - host: googleapis.com
        port: 443
        access: full
      - host: cloudflare.com
        port: 443
        access: full
      - host: cdnjs.cloudflare.com
        port: 443
        access: full
      - host: stackoverflow.com
        port: 443
        access: full
      - host: medium.com
        port: 443
        access: full
      - host: arxiv.org
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
      - { path: /usr/local/bin/node }
      - { path: /usr/local/bin/python3 }

  # ── 国内常用资源 ──────────────────────────────────────────────────────────────
  china_mirrors:
    name: china_mirrors
    endpoints:
      - host: mirrors.tuna.tsinghua.edu.cn
        port: 443
        access: full
      - host: mirrors.tuna.tsinghua.edu.cn
        port: 80
        access: full
      - host: mirrors.ustc.edu.cn
        port: 443
        access: full
      - host: mirrors.ustc.edu.cn
        port: 80
        access: full
      - host: pypi.tuna.tsinghua.edu.cn
        port: 443
        access: full
      - host: pypi.douban.com
        port: 443
        access: full
      - host: developer.baidu.com
        port: 443
        access: full
      - host: www.zhihu.com
        port: 443
        access: full
      - host: www.csdn.net
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
      - { path: /usr/local/bin/python3 }
      - { path: /usr/bin/python3 }
